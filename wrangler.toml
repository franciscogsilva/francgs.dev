name = "francgs-dev"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# @astrojs/cloudflare outputs the Worker entrypoint at dist/_worker.js/index.js
# The assets directory points to dist so Wrangler serves static files from there.
# See: https://developers.cloudflare.com/workers/frameworks/framework-guides/astro/
main = "./dist/_worker.js/index.js"

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# ─── Production ────────────────────────────────────────────────────────────────
[env.production]
name = "francgs-dev"
routes = [
  { pattern = "francgs.dev", custom_domain = true },
  { pattern = "www.francgs.dev", custom_domain = true },
]

# Runtime secrets — configure via Cloudflare Dashboard or:
#   wrangler secret put SUPABASE_URL --env production
#   wrangler secret put SUPABASE_SERVICE_KEY --env production
#   wrangler secret put WEB3FORMS_ACCESS_KEY --env production

# ─── Staging ───────────────────────────────────────────────────────────────────
[env.staging]
name = "francgs-dev-staging"
