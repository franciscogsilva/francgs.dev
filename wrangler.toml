name = "francgs-dev"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# @astrojs/cloudflare outputs dist/_worker.js/ (worker) + dist/ (assets).
# In CI we move _worker.js/ out to .cloudflare/worker/ before deploying,
# so assets.directory only contains public static files (no server code exposed).
main = "./.cloudflare/worker/index.js"

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# ─── Production ────────────────────────────────────────────────────────────────
[env.production]
name = "francgs-dev"
routes = [
  { pattern = "francgs.dev", custom_domain = true },
]
# www.francgs.dev: configure el redirect www → apex directamente
# en el DNS de Cloudflare (CNAME www → francgs.dev + proxy activado).

# Runtime secrets — configure via Cloudflare Dashboard or:
#   wrangler secret put SUPABASE_URL --env production
#   wrangler secret put SUPABASE_SERVICE_KEY --env production
#   wrangler secret put WEB3FORMS_ACCESS_KEY --env production

# ─── Staging ───────────────────────────────────────────────────────────────────
[env.staging]
name = "francgs-dev-staging"
