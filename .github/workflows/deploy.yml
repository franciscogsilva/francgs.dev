name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy-production:
    name: Deploy to Cloudflare Workers
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install dependencies (wrangler)
        run: pnpm install

      - name: Prepare deploy structure
        run: |
          # Move the worker entrypoint out of dist/ so assets.directory only contains public files
          # @astrojs/cloudflare outputs: dist/_worker.js/index.js (worker) + rest of dist (assets)
          mkdir -p .cloudflare
          cp -r dist/_worker.js .cloudflare/worker
          rm -rf dist/_worker.js

      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "### ✅ Production Deployment Successful! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **URL:** https://francgs.dev" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  crosspost-missing-only:
    name: Crosspost Missing Only (${{ matrix.platform }})
    needs: deploy-production
    if: ${{ needs.deploy-production.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        platform: [devto, medium]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install

      - name: Restore crosspost state cache
        uses: actions/cache@v4
        with:
          path: .crosspost/state-${{ matrix.platform }}.json
          key: crosspost-state-${{ matrix.platform }}-${{ github.run_id }}
          restore-keys: |
            crosspost-state-${{ matrix.platform }}-

      - name: Sync only non-migrated posts
        continue-on-error: true
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
          SITE_URL: https://francgs.dev
          CROSSPOST_STATE_PATH: .crosspost/state-${{ matrix.platform }}.json
          CROSSPOST_LANGS: en
          CROSSPOST_PRIORITY_SLUGS: 50-refactor-real-blog-bilingue-rutas-hreflang-y-seo-consistente-en,49-como-construimos-un-sistema-de-sincronizacion-automatizada-devto-medium-en
          CROSSPOST_DEVTO_PUBLISHED: "true"
          CROSSPOST_DEVTO_MAX_RETRIES: "6"
          CROSSPOST_DEVTO_MIN_INTERVAL_MS: "5000"
          CROSSPOST_MAX_POSTS: "1"
          CROSSPOST_MEDIUM_STATUS: "public"
          CROSSPOST_FAIL_ON_ERROR: "false"
        run: pnpm run crosspost -- --all --platform=${{ matrix.platform }}
